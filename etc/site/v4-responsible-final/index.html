<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détection d'image</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style/main.css">
    <script src="script/detection.js" defer></script>
</head>

<body class="no-scroll">

    <header>
        <span class="header-dot"></span>
        <div class="header-right">
            <a href="fonctionnement.html">Fonctionnement du service</a>
            <a href="galerie.html">Galerie de détections</a>
        </div>
        <h1 class="titre"><a href="index.html">Détection d'image</a></h1>
    </header>

    <main>
        <div class="glass-panel">

            <div class="actions">
                <label for="photo" class="btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                    Prendre une photo
                </label>
                <input type="file" id="photo" capture="environment" accept="image/*,video/*"
                    onchange="handleFile(this)" />

                <label for="upload" class="btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    Choisir un fichier
                </label>
                <input type="file" id="upload" accept="image/*" style="display:none;" onchange="handleFile(this)" />

                <label for="randomImage" class="btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                        <path d="M14 10l2.5-2.5 2.5 2.5" stroke-dasharray="0 0"></path>
                        <path d="M19 7.5l-5 5-2-2-5 5" stroke-dasharray="0 0"></path>
                    </svg>
                    Photo aléatoire
                </label>
                <input id="randomImage" style="display:none;" onclick="selectRandomImage()" />

                <div class="dropdown-wrapper">
                    <button class="btn dropdown-trigger" id="btnModuleChoice">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z" />
                            <path d="M12 8v4l3 3" />
                        </svg>
                        <span id="selectedModuleLabel">Choisir un module ia</span>
                        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-menu-inner">
                            <button class="dropdown-item" onclick="selectModule(event, 'yolov')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="2" width="20" height="20" rx="3" />
                                    <path d="M7 12l3 3 7-7" />
                                </svg>
                                YOLOv Detection
                            </button>
                            <button class="dropdown-item" onclick="selectModule(event, 'cartoonizer')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10" />
                                    <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                                    <line x1="9" y1="9" x2="9.01" y2="9" />
                                    <line x1="15" y1="9" x2="15.01" y2="9" />
                                </svg>
                                Cartoonizer
                            </button>
                            <button class="dropdown-item" onclick="selectModule(event, 'superresolution')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="17 8 12 3 7 8" />
                                    <line x1="12" y1="3" x2="12" y2="15" />
                                </svg>
                                Super Resolution
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="preview-wrap" id="previewWrap">
                <img id="preview" alt="Aperçu" />
                <div class="preview-empty" id="previewEmpty">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <span>Aucune image sélectionnée</span>
                </div>
            </div>

            <button class="btn btn-primary" id="detectBtn" onclick="detectScene()" style="display:none; width:100%;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <span id="detectBtnLabel">Analyser la photo</span>
            </button>

            <button class="btn btn-primary" id="downloadImageBttn" onclick="downloadResultImage()" style="display:none; width:100%;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span id="downloadImageBttn">Télécharger l'image</span>
            </button>

            <p class="status" id="status"></p>

            <div class="result-card" id="resultCard">
                <p class="result-label">Objet détecté</p>
                <p class="result-value" id="resultLabel">—</p>
                <div class="conf-bar-wrap">
                    <div class="conf-bar" id="confBar"></div>
                </div>
                <p class="confidence" id="resultConf"></p>
            </div>

        </div>
    </main>

    <footer>
        <h3>Crédit</h3>
        <div>
            <a href="https://github.com/codeproject/CodeProject.AI-Server">Github CodeProject.AI</a>
            <span>Emmanuel PB., Jérôme B., Alexandre L., Cédric S., Victor D.</span>
        </div>
    </footer>
</body>

</html>
